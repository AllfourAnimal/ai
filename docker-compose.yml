services:
  chatbot_server:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn chatbot_server.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src

  recommendation_server:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn recommendation_server.app.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      PYTHONPATH: /app/src
