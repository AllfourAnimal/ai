<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recommendation Prototype</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Animal Recommendation Prototype</h1>
      <p>데모 DB에서 데이터를 읽어 추천 결과를 바로 확인합니다.</p>
      <div class="layout">
        <section class="panel">
          <textarea id="payload">{
  "preferredAnimal": "강아지",
  "preferredSize": "소형견",
  "preferredSpecies": "포메라니안",
  "preferredAgeGroup": "",
  "activityLevel": "",
  "sexCd": "",
  "neuterYn": "",
  "userPreference": {}
}</textarea>
          <div class="actions">
            <button id="send">Run Recommend</button>
          </div>
          <div class="status" id="status">준비됨</div>
        </section>
        <section class="panel">
          <div id="cards" class="cards"></div>
          <pre id="raw">{}</pre>
        </section>
      </div>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
